      <line x1="230" y1="130" x2="295" y2="130" stroke="#27ae60" strokeWidth="2.5"/>
      <text x="232" y="148" fontSize="10" fill="#27ae60">Produits (Hp)</text>

      <path d="M100,60 Q135,15 165,15 Q195,15 230,130" fill="none" stroke="#c0392b" strokeWidth="2.5" strokeLinejoin="round"/>

      <line x1="170" y1="60" x2="170" y2="18" stroke="#8e44ad" strokeWidth="1.5" strokeDasharray="4,3"/>

}

function RecognTable() {

    ["Température du milieu", "↑ Augmente", "↓ Diminue"],
    ["Diagramme énergétique", "Produits plus bas que réactifs", "Produits plus haut que réactifs"],
  ];
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.88rem"}}>
        <thead>
          <tr>
            <th style={{background:"#f0f0f0",padding:"9px 12px",border:"1px solid #ddd",textAlign:"left"}}>Indice</th>
            <th style={{background:"#fff0f0",padding:"9px 12px",border:"1px solid #ddd",color:"#c0392b"}}>🔥 Exothermique</th>
            <th style={{background:"#f0f8ff",padding:"9px 12px",border:"1px solid #ddd",color:"#2980b9"}}>🧊 Endothermique</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r,i) => (
            <tr key={i} style={{background:i%2===0?"#fff":"#fafafa"}}>
              <td style={{padding:"8px 12px",border:"1px solid #ddd",fontWeight:600,color:"#444"}}>{r[0]}</td>

}

function NotationCompare() {
  return (
    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
      {[
        { title:"🔥 Exo — Notation intégrée", bg:"#fff0f0", border:"#f1948a", eq:"Réactifs → Produits + énergie", note:"L'énergie est à droite (produit)." },
        { title:"🔥 Exo — Notation ΔH", bg:"#fff0f0", border:"#f1948a", eq:"Réactifs → Produits    ΔH = valeur négative", note:"ΔH < 0 → énergie dégagée" },
        { title:"🧊 Endo — Notation intégrée", bg:"#f0f8ff", border:"#7fb3d3", eq:"Réactifs + énergie → Produits", note:"L'énergie est à gauche (réactif)." },
        { title:"🧊 Endo — Notation ΔH", bg:"#f0f8ff", border:"#7fb3d3", eq:"Réactifs → Produits    ΔH = valeur positive", note:"ΔH > 0 → énergie absorbée" },
      ].map((c,i) => (
        <div key={i} style={{flex:"1 1 220px",background:c.bg,border:`1.5px solid ${c.border}`,borderRadius:10,padding:"0.9rem"}}>
          <div style={{fontWeight:700,fontSize:"0.88rem",marginBottom:8,color:"#333"}}>{c.title}</div>
          <div style={{fontFamily:"'Courier New',monospace",fontSize:"0.84rem",background:"#fff",border:"1px solid #ddd",borderRadius:6,padding:"6px 10px",marginBottom:6,color:"#1a1a2e"}}>{c.eq}</div>
          <div style={{fontSize:"0.82rem",color:"#666"}}>{c.note}</div>
        </div>
      ))}
    </div>
  );
}

        <div style={{fontWeight:700,color:"#c0392b",marginBottom:10,fontSize:"0.95rem",textAlign:"center"}}>🔥 Réaction EXOTHERMIQUE</div>
        <DiagramExo/>
        <ul style={{paddingLeft:16,marginTop:10,fontSize:"0.83rem",color:"#555"}}>
          <li style={{marginBottom:4}}>Produits plus <strong>bas</strong> que réactifs</li>
          <li style={{marginBottom:4}}>ΔH = Hp − Hr <strong>&lt; 0</strong></li>
          <li style={{marginBottom:4}}>Ead (direct) <strong>&lt;</strong> Eainv (inverse)</li>
          <li>Energie dégagée dans le milieu</li>
        </ul>
      </div>
      <div style={{flex:"1 1 260px",background:"#fff",border:"2px solid #2980b9",borderRadius:12,padding:"1rem"}}>
        <div style={{fontWeight:700,color:"#2980b9",marginBottom:10,fontSize:"0.95rem",textAlign:"center"}}>🧊 Réaction ENDOTHERMIQUE</div>
        <DiagramEndo/>
        <ul style={{paddingLeft:16,marginTop:10,fontSize:"0.83rem",color:"#555"}}>
          <li style={{marginBottom:4}}>Produits plus <strong>haut</strong> que réactifs</li>
          <li style={{marginBottom:4}}>ΔH = Hp − Hr <strong>&gt; 0</strong></li>
          <li style={{marginBottom:4}}>Ead (direct) <strong>&gt;</strong> Eainv (inverse)</li>
          <li>Énergie absorbée du milieu</li>
        </ul>
      </div>
    </div>
  );
}

function CalculExemple() {
  return (
    <div style={{background:"#fffbea",border:"1px solid #f0d040",borderRadius:12,padding:"1.1rem"}}>
      <div style={{fontWeight:700,color:"#7d6608",marginBottom:10,fontSize:"0.95rem"}}>📝 Exemple : H₂(g) + Cl₂(g) → 2 HCl(g)</div>
      <div style={{fontSize:"0.88rem",color:"#444",lineHeight:1.85}}>
        <div style={{marginBottom:6}}><strong>Liaisons à briser (réactifs) :</strong></div>
        <div style={{background:"#fff",border:"1px solid #ddd",borderRadius:6,padding:"6px 12px",fontFamily:"monospace",marginBottom:6,fontSize:"0.85rem"}}>
          1 × H−H = +432 kJ/mol (absorbée)<br/>
          1 × Cl−Cl = +243 kJ/mol (absorbée)<br/>
          <strong>Total absorbé = +675 kJ/mol</strong>
        </div>
        <div style={{marginBottom:6}}><strong>Liaisons à former (produits) :</strong></div>
        <div style={{background:"#fff",border:"1px solid #ddd",borderRadius:6,padding:"6px 12px",fontFamily:"monospace",marginBottom:8,fontSize:"0.85rem"}}>
          2 × H−Cl = 2 × (−431) = −862 kJ/mol (dégagée)<br/>
          <strong>Total dégagé = −862 kJ/mol</strong>
        </div>
        <div style={{background:"#c0392b15",border:"1.5px solid #c0392b",borderRadius:8,padding:"8px 12px",fontFamily:"monospace",fontSize:"0.9rem"}}>
          ΔH = +675 + (−862) = <strong style={{color:"#c0392b"}}>−187 kJ/mol</strong> → Réaction EXOTHERMIQUE ✓
        </div>
      </div>
    </div>
  );
}

// ─── Block renderer ───────────────────────────────────────────────────────────
function Block({ block, color }) {
  switch (block.type) {
    case "intro":
      return <p style={{fontSize:"1.01rem",lineHeight:1.85,color:"#444",background:"#f8f9fb",borderLeft:`4px solid ${color}`,padding:"1rem 1.4rem",borderRadius:"0 8px 8px 0"}}>{block.text}</p>;

    case "definition":
      return (
        <div style={{background:`${color}12`,border:`2px solid ${color}`,borderRadius:12,padding:"1rem 1.4rem"}}>
          <div style={{fontWeight:700,color:color,marginBottom:6,fontSize:"0.84rem",textTransform:"uppercase",letterSpacing:1}}>📌 {block.title}</div>
          <p style={{margin:0,lineHeight:1.82,color:"#333",fontSize:"0.95rem",whiteSpace:"pre-line"}}>{block.text}</p>
        </div>
      );

    case "subtitle":
      return <h3 style={{color:"#222",borderBottom:`2px solid ${color}`,paddingBottom:7,marginTop:28,fontSize:"1.04rem"}}>{block.text}</h3>;

    case "steps":
      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {block.steps.map((s,i) => (
            <div key={i} style={{display:"flex",gap:14,alignItems:"flex-start",background:"#fff",border:"1px solid #e8eaed",borderRadius:10,padding:"0.95rem",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:"1.6rem",minWidth:40,textAlign:"center"}}>{s.icon}</div>
              <div>
                <div style={{fontWeight:700,marginBottom:4,color:"#1a1a2e",fontSize:"0.96rem"}}>{s.title}</div>
                <div style={{color:"#555",fontSize:"0.91rem",lineHeight:1.75,whiteSpace:"pre-line"}}>{s.text}</div>
              </div>
            </div>
          ))}
        </div>
      );

    case "compare":
      return (
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {block.items.map((c,i) => (
            <div key={i} style={{flex:"1 1 220px",background:`${c.color}10`,border:`2px solid ${c.color}`,borderRadius:12,padding:"1rem",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:"1.5rem",marginBottom:6}}>{c.icon}</div>
              <div style={{fontWeight:700,color:c.color,marginBottom:6,fontSize:"0.9rem",textTransform:"uppercase"}}>{c.zone}</div>
              <div style={{color:"#555",fontSize:"0.9rem",lineHeight:1.75}}>{c.desc}</div>
            </div>
          ))}
        </div>
      );

    case "encadre":
      return (
        <div style={{background:`${color}10`,border:`1.5px solid ${color}55`,borderRadius:12,padding:"1rem 1.3rem"}}>
          <div style={{fontWeight:700,color:color,marginBottom:8,fontSize:"0.95rem"}}>💡 {block.title}</div>
          {block.text && <p style={{color:"#444",lineHeight:1.8,fontSize:"0.93rem",marginBottom:block.items.length>0?10:0}}>{block.text}</p>}
          {block.items.length > 0 && (
            <ul style={{margin:0,paddingLeft:18}}>
              {block.items.map((it,i) => <li key={i} style={{color:"#444",marginBottom:5,fontSize:"0.91rem",fontFamily:"'Courier New',monospace"}}>{it}</li>)}
            </ul>
          )}
        </div>
      );

    case "fact":
      return (
        <div style={{background:"#fffbea",border:"1px solid #f0d040",borderRadius:10,padding:"0.9rem 1.3rem",display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:"1.4rem"}}>💡</span>
          <p style={{margin:0,color:"#555",lineHeight:1.8,fontSize:"0.91rem"}}>{block.text}</p>
        </div>
      );

    case "examples":
      return (
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {block.items.map((it,i) => {
            const c = it.type==="exo" ? "#c0392b" : "#2980b9";
            return (
              <div key={i} style={{flex:"1 1 220px",background:`${c}10`,border:`1.5px solid ${c}40`,borderRadius:10,padding:"0.9rem"}}>
                <div style={{fontWeight:700,color:c,marginBottom:8,fontSize:"0.9rem"}}>{it.icon} {it.label}</div>
                <ul style={{paddingLeft:14,margin:0}}>
                  {it.exemples.map((e,j) => <li key={j} style={{fontSize:"0.85rem",color:"#444",marginBottom:4,lineHeight:1.5}}>{e}</li>)}
                </ul>
              </div>
            );
          })}
        </div>
      );

    case "reconn_table":   return <RecognTable/>;
    case "notation_compare": return <NotationCompare/>;
    case "diagrams_explained": return <DiagramsExplained/>;
    case "calcul_exemple": return <CalculExemple/>;

    default: return null;
  }
}

function SectionView({ section, onBack }) {
  const c = SC[section.id];
  return (
    <div style={{maxWidth:720,margin:"0 auto",padding:"1rem"}}>
      <button onClick={onBack} style={{background:"none",border:`2px solid ${c.main}`,color:c.main,borderRadius:8,padding:"6px 18px",cursor:"pointer",fontWeight:700,marginBottom:22,fontSize:"0.9rem"}}>← Retour</button>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:26}}>
        <div style={{fontSize:"3rem"}}>{section.emoji}</div>
        <div>
          <div style={{fontSize:"0.78rem",fontWeight:700,color:c.main,textTransform:"uppercase",letterSpacing:1.5}}>Section {section.number}</div>
          <h2 style={{margin:0,color:"#1a1a2e",fontSize:"1.45rem",lineHeight:1.3}}>{section.title}</h2>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        {section.content.map((block,i) => <Block key={i} block={block} color={c.main}/>)}
      </div>
    </div>
  );
}

const COURSE_ID = "reactions";

function QuizView({ onBack }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);

  const q = quizQuestions[current];
  const handleNext = () => {
    const na = [...answers, selected];
    if (current + 1 >= quizQuestions.length) { setAnswers(na); setDone(true); }
    else { setAnswers(na); setSelected(null); setCurrent(current + 1); }
  };
  const handleRestart = () => { setCurrent(0); setSelected(null); setAnswers([]); setDone(false); };

  if (done) {
    const score = answers.filter((a,i) => a === quizQuestions[i].answer).length;
    const pct = Math.round((score / quizQuestions.length) * 100);
    return (
      <div style={{maxWidth:640,margin:"0 auto",padding:"2rem 1rem",textAlign:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"2px solid #888",color:"#888",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,marginBottom:24,fontSize:"0.9rem"}}>← Retour</button>
        <div style={{fontSize:"4rem",marginBottom:8}}>{pct>=80?"🏆":pct>=60?"👍":"📚"}</div>
        <h2 style={{color:"#1a1a2e",marginBottom:6}}>Résultats</h2>
        <div style={{fontSize:"3rem",fontWeight:900,color:pct>=80?"#27ae60":pct>=60?"#f39c12":"#c0392b",marginBottom:8}}>{score} / {quizQuestions.length}</div>
        <div style={{color:"#666",marginBottom:28}}>{pct>=80?"Excellent ! Tu maîtrises les réactions endo/exo 🎉":pct>=60?"Bon effort ! Relis les sections moins bien réussies.":"Relis le cours attentivement et réessaie !"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,textAlign:"left",marginBottom:28}}>
          {quizQuestions.map((qq,i) => (
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:answers[i]===qq.answer?"#eafaf1":"#fdf0ef",border:`1px solid ${answers[i]===qq.answer?"#82e0aa":"#f1948a"}`,borderRadius:8,padding:"0.7rem 1rem",fontSize:"0.86rem"}}>
              <span>{answers[i]===qq.answer?"✅":"❌"}</span>
              <div>
                <div style={{fontWeight:600,color:"#333",marginBottom:2}}>{qq.q}</div>
                {answers[i]!==qq.answer && <div style={{color:"#c0392b",fontSize:"0.84rem"}}>✓ {qq.options[qq.answer]}</div>}
              </div>
            </div>
          ))}
        </div>
        <button onClick={handleRestart} style={{background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,padding:"12px 32px",cursor:"pointer",fontWeight:700,fontSize:"1rem"}}>🔄 Recommencer</button>
      </div>
    );
  }

  return (
    <div style={{maxWidth:640,margin:"0 auto",padding:"1rem"}}>
      <button onClick={onBack} style={{background:"none",border:"2px solid #888",color:"#888",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,marginBottom:20,fontSize:"0.9rem"}}>← Retour</button>
      <div style={{background:"#e8eaed",borderRadius:20,height:8,marginBottom:20,overflow:"hidden"}}>
        <div style={{background:"#c0392b",height:"100%",width:`${(current/quizQuestions.length)*100}%`,transition:"width 0.4s ease",borderRadius:20}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
        <span style={{fontWeight:700,color:"#888",fontSize:"0.9rem"}}>Question {current+1} / {quizQuestions.length}</span>
      </div>
      <div style={{background:"linear-gradient(135deg,#c0392b12,white)",border:"2px solid #c0392b",borderRadius:14,padding:"1.4rem",marginBottom:18}}>
        <p style={{fontSize:"1.02rem",fontWeight:600,color:"#1a1a2e",margin:0,lineHeight:1.65}}>{q.q}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {q.options.map((opt,i) => {
          let bg="#fff", border="1px solid #ddd", col="#333", fw=400;
          if (selected !== null) {
            if (i===q.answer) { bg="#eafaf1"; border="2px solid #27ae60"; col="#1e8449"; fw=700; }
            else if (i===selected) { bg="#fdf0ef"; border="2px solid #e74c3c"; col="#c0392b"; }
          }
          return (
            <button key={i} onClick={() => { if(selected===null) setSelected(i); }}
              style={{background:bg,border,borderRadius:10,padding:"0.95rem 1.2rem",cursor:selected!==null?"default":"pointer",textAlign:"left",color:col,fontWeight:fw,fontSize:"0.93rem",lineHeight:1.5,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
              <span style={{fontWeight:800,marginRight:10,opacity:0.5}}>{String.fromCharCode(65+i)}.</span>{opt}
              {selected!==null&&i===q.answer&&<span style={{marginLeft:8}}>✓</span>}
              {selected!==null&&i===selected&&i!==q.answer&&<span style={{marginLeft:8}}>✗</span>}
            </button>
          );
        })}
      </div>
      {selected!==null && selected!==q.answer && (
        <div style={{background:"#fffbe6",border:"1px solid #f0d060",borderRadius:10,padding:"0.8rem 1rem",marginBottom:12,fontSize:"0.9rem",color:"#555"}}>
          💡 <strong>Explication :</strong> {q.explication}
        </div>
      )}
      {selected!==null && (
        <button onClick={handleNext} style={{width:"100%",background:"#c0392b",color:"#fff",border:"none",borderRadius:10,padding:"13px",cursor:"pointer",fontWeight:700,fontSize:"1rem"}}>
          {current+1>=quizQuestions.length?"Voir mes résultats →":"Question suivante →"}
        </button>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState("home");
  const [activeSection, setActiveSection] = useState(null);

  if (view==="section" && activeSection) {
    return <div style={{minHeight:"100vh",background:"#f3f4f8",padding:"1.5rem 0 3rem"}}><SectionView section={activeSection} onBack={()=>setView("home")}/></div>;
  }
  if (view==="quiz") {
    return <div style={{minHeight:"100vh",background:"#f3f4f8",padding:"1.5rem 0 3rem"}}><QuizView onBack={()=>setView("home")}/></div>;
  }

  return (
    <div style={{minHeight:"100vh",background:"#f3f4f8"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a0505 0%,#7b241c 40%,#1c1a3a 100%)",padding:"3rem 1rem 2.5rem",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 25% 50%,#e74c3c28 0%,transparent 55%), radial-gradient(ellipse at 75% 30%,#8e44ad22 0%,transparent 55%), radial-gradient(ellipse at 50% 80%,#e67e2218 0%,transparent 55%)"}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:"0.8rem",fontWeight:700,color:"#f5b7b1",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Chimie · Secondaire 5 · Aspect énergétique des transformations</div>
          <h1 style={{color:"#fff",fontSize:"clamp(1.4rem,5vw,2.3rem)",margin:"0 0 10px",fontWeight:900}}>🔥 Réactions endothermiques et exothermiques</h1>
          <p style={{color:"#f9ebea",fontSize:"1rem",margin:"0 0 18px"}}>Équations thermochimiques · Enthalpie · Diagrammes énergétiques · Liaisons chimiques</p>
          <div style={{display:"flex",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
            {["🔥 Endo vs exo","⚗️ ΔH & équations","📊 Diagramme énergétique","🔗 Bilan & liaisons"].map((t,i) => (
              <span key={i} style={{background:"rgba(255,255,255,0.13)",color:"#fff",borderRadius:20,padding:"4px 14px",fontSize:"0.8rem",fontWeight:600}}>{t}</span>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:720,margin:"0 auto",padding:"2rem 1rem"}}>

        <div style={{background:"#fff",border:"2px solid #c0392b",borderRadius:14,padding:"1.2rem 1.4rem",marginBottom:28,display:"flex",gap:14,alignItems:"flex-start"}}>
          <span style={{fontSize:"2rem"}}>📋</span>
          <div>
            <div style={{fontWeight:700,color:"#7b241c",marginBottom:5,fontSize:"1rem"}}>Comment utiliser ce cours</div>
            <p style={{color:"#555",fontSize:"0.92rem",lineHeight:1.78,margin:0}}>Lis chaque section dans l'ordre. Les formules importantes sont encadrées. Les diagrammes SVG sont intégrés directement dans le cours. Termine avec le quiz de 12 questions pour valider ta maîtrise avant l'examen !</p>
          </div>
        </div>

        <h2 style={{color:"#1a1a2e",fontSize:"1.1rem",fontWeight:700,marginBottom:16}}>📖 Sections du cours</h2>

        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:32}}>
          {sections.map(s => {
            const c = SC[s.id];
            return (
              <button key={s.id} onClick={()=>{setActiveSection(s);setView("section");}}
                style={{background:"#fff",border:`2px solid ${c.main}`,borderRadius:14,padding:"1.2rem 1.4rem",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 6px 20px ${c.main}35`;}}
                onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)";}}>
                <div style={{fontSize:"2.2rem"}}>{s.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.76rem",fontWeight:700,color:c.main,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Section {s.number}</div>
                  <div style={{fontWeight:700,color:"#1a1a2e",fontSize:"1rem"}}>{s.title}</div>
                </div>
                <div style={{color:c.main,fontSize:"1.3rem",fontWeight:900}}>→</div>
              </button>
            );
          })}
        </div>

        {/* Quiz card */}
        <div onClick={()=>setView("quiz")} style={{background:"linear-gradient(135deg,#1a0505,#1c1a3a)",borderRadius:16,padding:"1.8rem",textAlign:"center",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.22)"}}>
          <div style={{fontSize:"2.5rem",marginBottom:8}}>🧠</div>
          <div style={{fontWeight:900,color:"#fff",fontSize:"1.2rem",marginBottom:5}}>Quiz — Teste tes connaissances</div>
          <div style={{color:"#f5b7b1",fontSize:"0.9rem",marginBottom:18}}>{quizQuestions.length} questions · Toutes les sections · Niveau secondaire 5</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:18}}>
            <span style={{background:"#c0392b",color:"#fff",borderRadius:20,padding:"3px 14px",fontSize:"0.82rem",fontWeight:700}}>🔥 Endo vs exo</span>
            <span style={{background:"#8e44ad",color:"#fff",borderRadius:20,padding:"3px 14px",fontSize:"0.82rem",fontWeight:700}}>⚗️ ΔH</span>
            <span style={{background:"#16a085",color:"#fff",borderRadius:20,padding:"3px 14px",fontSize:"0.82rem",fontWeight:700}}>📊 Diagrammes</span>
            <span style={{background:"#e67e22",color:"#fff",borderRadius:20,padding:"3px 14px",fontSize:"0.82rem",fontWeight:700}}>🔗 Liaisons</span>
          </div>
          <div style={{background:"#c0392b",color:"#fff",borderRadius:8,padding:"10px 28px",display:"inline-block",fontWeight:700,fontSize:"1rem"}}>Commencer le quiz →</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
