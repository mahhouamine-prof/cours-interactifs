<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Les types de roches — Section 5.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f6fb; }
  button { font-family: inherit; }
  table { border-collapse: collapse; width: 100%; }
  @media (max-width: 500px) { h1 { font-size: 1.4rem !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState } = React;

const sections = [
  {
    id: "intro_roches",
    emoji: "🪨",
    number: "5.1",
    title: "Qu'est-ce qu'une roche ?",
    color: "#e07b39",
    content: [
      { type: "intro", text: "Les roches et les minéraux sont à la base de presque tous les objets que nous utilisons quotidiennement : les murs en gypse, les comptoirs en marbre, l'asphalte des routes, les vitres en silice… Les roches sont partout !" },
      { type: "definition", title: "Définition", text: "Les roches sont des assemblages de minéraux qui forment la croûte terrestre. Une roche peut être formée d'un seul type de minéral ou de plusieurs types de minéraux." },
      { type: "subtitle", text: "Les trois grands types de roches" },
      { type: "steps", steps: [
        { icon: "🔥", title: "Roches ignées", text: "Formées par le refroidissement et la cristallisation du magma. Elles constituent la majorité des croûtes continentales et océaniques." },
        { icon: "🌊", title: "Roches sédimentaires", text: "Formées par le dépôt et la compaction de sédiments (fragments de roches, fossiles, minéraux). Ce sont les plus fréquentes à la surface de la Terre." },
        { icon: "💎", title: "Roches métamorphiques", text: "Formées quand des roches existantes sont transformées par des températures et des pressions extrêmes en profondeur." },
      ]},
      { type: "fact", text: "Les plus vieilles roches du monde se trouvent au Québec ! En 2008, des géologues de l'Université McGill ont découvert des roches datant de 4,28 milliards d'années près de la baie d'Hudson." },
    ],
  },
  {
    id: "cycle",
    emoji: "🔄",
    number: "5.1",
    title: "Le cycle de formation des roches",
    color: "#3a9e6e",
    content: [
      { type: "intro", text: "Les trois types de roches ne sont pas fixes : elles se transforment les unes en les autres dans un grand cycle qui dure des millions d'années. Le magma est le point de départ et d'arrivée de ce cycle." },
      { type: "subtitle", text: "Les étapes du cycle" },
      { type: "steps", steps: [
        { icon: "1️⃣", title: "Le magma", text: "Le magma circule sous la croûte terrestre. C'est la matière de base à l'origine de toutes les roches." },
        { icon: "2️⃣", title: "Roches ignées", text: "Le magma refroidit et se cristallise pour former des roches ignées. Si le refroidissement est rapide (volcan), les cristaux sont petits (roche extrusive). Si c'est lent (sous terre), les cristaux sont gros (roche intrusive)." },
        { icon: "3️⃣", title: "Érosion et sédiments", text: "Les roches ignées exposées à la surface sont attaquées par le vent, l'eau et la glace. Elles se fragmentent en sédiments qui sont transportés et déposés." },
        { icon: "4️⃣", title: "Roches sédimentaires", text: "Les sédiments s'accumulent en couches, se compactent et se cimentent pour former des roches sédimentaires. Des fossiles peuvent s'y retrouver." },
        { icon: "5️⃣", title: "Roches métamorphiques", text: "Sous l'effet d'une chaleur et d'une pression extrêmes, n'importe quelle roche peut se transformer en roche métamorphique. Les minéraux se recristallisent et s'orientent en bandes." },
        { icon: "🔁", title: "Retour au magma", text: "Toutes les roches peuvent finir enfouies dans les profondeurs de la Terre, fondre et redevenir du magma. Et le cycle recommence !" },
      ]},
      { type: "fact", text: "Le cycle des roches est si lent qu'une roche peut mettre des centaines de millions d'années à se transformer complètement !" },
    ],
  },
  {
    id: "ignees",
    emoji: "🌋",
    number: "5.1",
    title: "Les roches ignées",
    color: "#cc3333",
    content: [
      { type: "intro", text: "Les roches ignées sont le résultat du refroidissement et de la cristallisation du magma. Elles constituent la majorité des roches qui forment les croûtes continentales et océaniques." },
      { type: "definition", title: "Définition", text: "Les roches ignées se forment par le refroidissement du magma. Selon la vitesse du refroidissement, on distingue les roches extrusives (rapide, à la surface) et les roches intrusives (lent, sous la surface)." },
      { type: "subtitle", text: "Les deux sous-types" },
      { type: "parts", items: [
        { icon: "⚡", name: "Roches extrusives (extrusion rapide)", desc: "Le magma jaillit d'un volcan sous forme de lave. Le refroidissement est rapide → cristaux petits ou inexistants → texture fine ou vitreuse. Exemple : l'obsidienne." },
        { icon: "🐢", name: "Roches intrusives (refroidissement lent)", desc: "Le magma refroidit lentement sous la surface de la Terre → cristaux gros, visibles à l'œil nu → texture grenue. Exemple : le granite, la péridotite." },
      ]},
      { type: "vocab", title: "Vocabulaire clé", items: [
        { term: "Cristallisation", def: "Processus de formation des cristaux propre à certains minéraux lors du refroidissement du magma." },
        { term: "Texture grenue", def: "Texture d'une roche dont les grains (cristaux) sont visibles à l'œil nu. Caractéristique des roches intrusives." },
        { term: "Texture vitreuse", def: "Texture d'une roche sans cristaux visibles, comme du verre. Caractéristique des roches extrusives refroidies très rapidement." },
      ]},
      { type: "fact", text: "La plupart des roches qui forment les croûtes continentales et océaniques sont des roches ignées. Sous nos pieds, c'est principalement du granite !" },
    ],
  },
  {
    id: "sedimentaires",
    emoji: "🏜️",
    number: "5.1",
    title: "Les roches sédimentaires",
    color: "#c8a227",
    content: [
      { type: "intro", text: "Les roches sédimentaires sont les plus fréquentes à la surface terrestre et dans les fonds marins. Elles sont formées par l'accumulation de sédiments sur des millions d'années." },
      { type: "definition", title: "Définition", text: "Les roches sédimentaires sont formées par le dépôt de sédiments qui se compactent et se cimentent. Certaines contiennent des fossiles d'êtres vivants." },
      { type: "subtitle", text: "Les trois origines possibles" },
      { type: "parts", items: [
        { icon: "🌬️", name: "Origine détritique", desc: "Proviennent de l'érosion de roches existantes. Les fragments sont transportés par le vent, l'eau ou la glace, puis déposés et compactés. Exemple : le grès." },
        { icon: "🐚", name: "Origine biochimique", desc: "Résultent de la minéralisation d'êtres vivants ou de la décomposition d'organismes morts. Souvent riches en fossiles. Exemple : la craie, le calcaire." },
        { icon: "💧", name: "Origine chimique", desc: "Proviennent de l'évaporation des eaux et de la minéralisation de solutions chimiques. Exemple : le gypse, le sel gemme (halite)." },
      ]},
      { type: "fact", text: "L'analyse des couches de roches sédimentaires nous renseigne sur l'histoire de la Terre et les êtres vivants qui existaient à chaque époque. C'est comme lire un livre d'histoire écrit dans la pierre !" },
    ],
  },
  {
    id: "metamorphiques",
    emoji: "💎",
    number: "5.1",
    title: "Les roches métamorphiques",
    color: "#7755cc",
    content: [
      { type: "intro", text: "Les roches métamorphiques sont des roches qui ont été transformées. Sous l'effet de températures et de pressions extrêmes dans les profondeurs de la Terre, n'importe quelle roche peut se métamorphoser." },
      { type: "definition", title: "Définition", text: "Les roches métamorphiques sont des roches dont la texture et les minéraux ont subi des transformations après avoir été exposés à des températures élevées et à de fortes pressions. Ce processus s'appelle le métamorphisme." },
      { type: "subtitle", text: "Comment se forment-elles ?" },
      { type: "steps", steps: [
        { icon: "🔥", title: "Chaleur extrême", text: "Les minéraux fondent partiellement sous l'effet de la chaleur dégagée par le magma. Ils se recristallisent sous une nouvelle forme." },
        { icon: "⬇️", title: "Pression intense", text: "Les fortes pressions orientent les minéraux recristallisés dans une direction particulière. On observe alors des bandes de cristaux alignés." },
        { icon: "🔄", title: "Transformation complète", text: "Toutes les roches ignées et sédimentaires peuvent devenir métamorphiques. Les roches métamorphiques peuvent même se transformer en d'autres roches métamorphiques sous des conditions encore plus extrêmes." },
      ]},
      { type: "vocab", title: "Exemples de transformations", items: [
        { term: "Granite → Gneiss", def: "Le granite (roche ignée) se transforme en gneiss (roche métamorphique) sous l'effet de la chaleur et de la pression." },
        { term: "Calcaire → Marbre", def: "Le calcaire (roche sédimentaire) se transforme en marbre (roche métamorphique). Le marbre est utilisé en sculpture et en architecture." },
        { term: "Grès → Quartzite", def: "Le grès (roche sédimentaire) se transforme en quartzite (roche métamorphique) par recristallisation des minéraux." },
      ]},
      { type: "fact", text: "Les roches métamorphiques se forment dans les profondeurs de la Terre, tout près du magma, là où la pression est si forte qu'elle peut écraser les minéraux et les réorganiser complètement !" },
    ],
  },
];

const quizQuestions = [
  { q: "Qu'est-ce qu'une roche ?", options: ["Un minéral pur", "Un assemblage de minéraux qui forme la croûte terrestre", "Une substance liquide issue du magma", "Un fossile d'organisme marin"], answer: 1, section: "intro_roches" , explication: "Une roche est toujours composée d'un ou plusieurs minéraux assemblés — ce n'est pas un minéral pur ni une substance liquide." },
  { q: "Combien y a-t-il de types principaux de roches ?", options: ["2", "3", "4", "5"], answer: 1, section: "intro_roches" , explication: "On distingue 3 grands types : ignées, sédimentaires et métamorphiques." },
  { q: "Quel est le point de départ du cycle de formation des roches ?", options: ["Les sédiments", "Les roches métamorphiques", "Le magma", "Les fossiles"], answer: 2, section: "cycle" , explication: "Le cycle des roches commence toujours par le magma, qui est la roche fondue en profondeur." },
  { q: "Comment se forment les roches sédimentaires ?", options: ["Par refroidissement du magma", "Par recristallisation sous pression", "Par dépôt et compaction de sédiments", "Par éruption volcanique"], answer: 2, section: "sedimentaires" , explication: "Les sédiments (débris, grains) s'accumulent et se compactent sur des millions d'années pour former des roches sédimentaires." },
  { q: "Quelle est la différence entre une roche ignée extrusive et intrusive ?", options: ["La couleur", "La vitesse de refroidissement du magma", "La profondeur des sédiments", "La présence de fossiles"], answer: 1, section: "ignees" , explication: "La différence clé : une roche extrusive refroidit vite en surface (petits cristaux), une intrusive refroidit lentement en profondeur (gros cristaux)." },
  { q: "Quelle roche ignée a une texture vitreuse car elle se refroidit très rapidement ?", options: ["Granite", "Gabbro", "Obsidienne", "Marbre"], answer: 2, section: "ignees" , explication: "L'obsidienne est formée d'un refroidissement si rapide que les cristaux n'ont pas le temps de se former, ce qui lui donne sa texture vitreuse." },
  { q: "Les roches sédimentaires d'origine biochimique proviennent de :", options: ["L'évaporation de l'eau", "L'érosion des roches", "La minéralisation d'êtres vivants", "La fusion du magma"], answer: 2, section: "sedimentaires" , explication: "Les roches biochimiques sont formées par la minéralisation de restes d'êtres vivants (coquillages, coraux, etc.)." },
  { q: "Quel processus transforme une roche en roche métamorphique ?", options: ["Le dépôt de sédiments", "La chaleur et la pression extrêmes", "Le refroidissement rapide de la lave", "L'évaporation de l'eau de mer"], answer: 1, section: "metamorphiques" , explication: "La chaleur et la pression extrêmes (mais sans faire fondre la roche) la transforment en roche métamorphique." },
  { q: "Quelle roche métamorphique provient du métamorphisme du calcaire ?", options: ["Gneiss", "Quartzite", "Obsidienne", "Marbre"], answer: 3, section: "metamorphiques" , explication: "Le calcaire soumis à un métamorphisme donne du marbre — une des roches métamorphiques les plus connues." },
  { q: "Où se trouvent les plus vieilles roches du monde ?", options: ["En Australie", "Au Québec, près de la baie d'Hudson", "En Sibérie", "Au Groenland"], answer: 1, section: "intro_roches" , explication: "Le Bouclier canadien, au Québec, contient certaines des roches les plus anciennes de la planète (plus de 4 milliards d'années)." },
];

const SC = {
  intro_roches:   { main: "#e07b39", dark: "#a04d15", light: "#fff0e6" },
  cycle:          { main: "#3a9e6e", dark: "#1e6645", light: "#e6fff4" },
  ignees:         { main: "#cc3333", dark: "#881111", light: "#ffe6e6" },
  sedimentaires:  { main: "#c8a227", dark: "#8a6c0a", light: "#fffbe6" },
  metamorphiques: { main: "#7755cc", dark: "#4433aa", light: "#f0eaff" },
};

function Block({ block, color }) {
  switch (block.type) {
    case "intro":
      return <p style={{fontSize:"1.05rem",lineHeight:1.8,color:"#444",background:"#f8f9fb",borderLeft:`4px solid ${color}`,padding:"1rem 1.2rem",borderRadius:"0 8px 8px 0"}}>{block.text}</p>;
    case "definition":
      return (
        <div style={{background:`${color}18`,border:`2px solid ${color}`,borderRadius:12,padding:"1rem 1.3rem"}}>
          <div style={{fontWeight:700,color:color,marginBottom:6,fontSize:"0.9rem",textTransform:"uppercase",letterSpacing:1}}>📌 {block.title}</div>
          <p style={{margin:0,lineHeight:1.7,color:"#333"}}>{block.text}</p>
        </div>
      );
    case "subtitle":
      return <h3 style={{color:"#333",borderBottom:`2px solid ${color}`,paddingBottom:6,marginTop:24}}>{block.text}</h3>;
    case "steps":
      return (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {block.steps.map((s,i) => (
            <div key={i} style={{display:"flex",gap:14,alignItems:"flex-start",background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"0.9rem 1rem",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:"1.8rem",minWidth:40,textAlign:"center"}}>{s.icon}</div>
              <div><div style={{fontWeight:700,marginBottom:3,color:"#222"}}>{s.title}</div><div style={{color:"#555",fontSize:"0.95rem",lineHeight:1.6}}>{s.text}</div></div>
            </div>
          ))}
        </div>
      );
    case "parts":
      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {block.items.map((p,i) => (
            <div key={i} style={{display:"flex",gap:12,background:"#fff",border:"1px solid #eee",borderRadius:10,padding:"0.8rem 1rem"}}>
              <span style={{fontSize:"1.6rem"}}>{p.icon}</span>
              <div><strong style={{color:"#222"}}>{p.name}</strong><div style={{color:"#555",fontSize:"0.92rem",marginTop:3}}>{p.desc}</div></div>
            </div>
          ))}
        </div>
      );
    case "vocab":
      return (
        <div>
          <div style={{fontWeight:700,marginBottom:10,color:"#555"}}>{block.title}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {block.items.map((v,i) => (
              <div key={i} style={{display:"flex",gap:10,background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"0.8rem 1rem",flexWrap:"wrap"}}>
                <div style={{fontWeight:700,minWidth:160,color:color}}>{v.term}</div>
                <div style={{color:"#555",fontSize:"0.93rem",lineHeight:1.6,flex:1}}>{v.def}</div>
              </div>
            ))}
          </div>
        </div>
      );
    case "fact":
      return (
        <div style={{background:"#fffbea",border:"1px solid #f0d040",borderRadius:10,padding:"0.9rem 1.2rem",display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:"1.5rem"}}>💡</span>
          <p style={{margin:0,color:"#555",lineHeight:1.7,fontSize:"0.95rem"}}>{block.text}</p>
        </div>
      );
    default: return null;
  }
}

function SectionView({ section, onBack }) {
  const c = SC[section.id];
  return (
    <div style={{maxWidth:700,margin:"0 auto",padding:"1rem"}}>
      <button onClick={onBack} style={{background:"none",border:`2px solid ${c.main}`,color:c.main,borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,marginBottom:20,fontSize:"0.9rem"}}>← Retour</button>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
        <div style={{fontSize:"3rem"}}>{section.emoji}</div>
        <div>
          <div style={{fontSize:"0.82rem",fontWeight:700,color:c.main,textTransform:"uppercase",letterSpacing:1}}>Section {section.number}</div>
          <h2 style={{margin:0,color:"#1a1a2e",fontSize:"1.6rem"}}>{section.title}</h2>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {section.content.map((block,i) => <Block key={i} block={block} color={c.main}/>)}
      </div>
    </div>
  );
}

const COURSE_ID = "roches";

function QuizView({ onBack }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answers, setAnswers] = useState([]);
  const [done, setDone] = useState(false);

  const q = quizQuestions[current];
  const c = SC[q.section];

  const handleNext = () => {
    const newAnswers = [...answers, selected];
    if (current + 1 >= quizQuestions.length) { setAnswers(newAnswers); setDone(true); }
    else { setAnswers(newAnswers); setSelected(null); setCurrent(current + 1); }
  };

  // Save score when quiz is done
  React.useEffect(() => {
    if (done) {
      const score = answers.filter((a,i) => a === quizQuestions[i].answer).length;
      const pct = Math.round((score / quizQuestions.length) * 100);
      const name = localStorage.getItem('eleve_nom') || '';
      if (name) {
        const key = 'scores_' + name.toLowerCase().replace(/\s+/g,'_');
        let scores = {};
        try { scores = JSON.parse(localStorage.getItem(key) || '{}'); } catch {}
        scores[COURSE_ID] = { score, total: quizQuestions.length, pct, date: new Date().toLocaleDateString('fr-CA') };
        localStorage.setItem(key, JSON.stringify(scores));
        // Also save to global list
        let allStudents = [];
        try { allStudents = JSON.parse(localStorage.getItem('tous_eleves') || '[]'); } catch {}
        if (!allStudents.includes(name)) { allStudents.push(name); localStorage.setItem('tous_eleves', JSON.stringify(allStudents)); }
      }
    }
  }, [done]);

  const handleRestart = () => { setCurrent(0); setSelected(null); setAnswers([]); setDone(false); };

  if (done) {
    const score = answers.filter((a,i) => a === quizQuestions[i].answer).length;
    const pct = Math.round((score / quizQuestions.length) * 100);
    return (
      <div style={{maxWidth:600,margin:"0 auto",padding:"2rem 1rem",textAlign:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"2px solid #888",color:"#888",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,marginBottom:24,fontSize:"0.9rem"}}>← Retour</button>
        <div style={{fontSize:"4rem",marginBottom:8}}>{pct>=80?"🏆":pct>=60?"👍":"📚"}</div>
        <h2 style={{color:"#1a1a2e",marginBottom:6}}>Résultats</h2>
        <div style={{fontSize:"3rem",fontWeight:900,color:pct>=80?"#3a9e6e":pct>=60?"#c8a227":"#cc3333"}}>{score} / {quizQuestions.length}</div>
        <div style={{color:"#666",marginBottom:28}}>{pct>=80?"Excellent travail !":pct>=60?"Bon effort, continue !":"Relis les sections et réessaie !"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,textAlign:"left",marginBottom:24}}>
          {quizQuestions.map((qq,i) => (
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:answers[i]===qq.answer?"#e8fff6":"#fff0f0",border:`1px solid ${answers[i]===qq.answer?"#88ddb0":"#ffaaaa"}`,borderRadius:8,padding:"0.7rem 1rem",fontSize:"0.88rem"}}>
              <span>{answers[i]===qq.answer?"✅":"❌"}</span>
              <div>
                <div style={{fontWeight:600,color:"#333",marginBottom:2}}>{qq.q}</div>
                {answers[i]!==qq.answer && <div><div style={{color:"#c00",fontWeight:600,marginBottom:4}}>Bonne réponse : {qq.options[qq.answer]}</div><div style={{color:"#555",fontSize:"0.82rem",background:"#fffbe6",borderRadius:6,padding:"4px 8px",marginTop:2}}>💡 {qq.explication}</div></div>}
              </div>
            </div>
          ))}
        </div>
        <button onClick={handleRestart} style={{background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,padding:"10px 28px",cursor:"pointer",fontWeight:700,fontSize:"1rem"}}>Recommencer</button>
      </div>
    );
  }

  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:"1rem"}}>
      <button onClick={onBack} style={{background:"none",border:"2px solid #888",color:"#888",borderRadius:8,padding:"6px 16px",cursor:"pointer",fontWeight:700,marginBottom:20,fontSize:"0.9rem"}}>← Retour</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <span style={{fontWeight:700,color:"#888",fontSize:"0.9rem"}}>Question {current+1} / {quizQuestions.length}</span>
        <span style={{background:`${c.main}22`,color:c.dark,borderRadius:20,padding:"3px 12px",fontSize:"0.82rem",fontWeight:700}}>Section 5.1</span>
      </div>
      <div style={{background:`linear-gradient(135deg, ${c.main}18, white)`,border:`2px solid ${c.main}`,borderRadius:14,padding:"1.4rem",marginBottom:16}}>
        <p style={{fontSize:"1.05rem",fontWeight:600,color:"#1a1a2e",margin:0,lineHeight:1.6}}>{q.q}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {q.options.map((opt,i) => {
          let bg="#fff", border="1px solid #ddd", col="#333", fw=400;
          if (selected !== null) {
            if (i===q.answer) { bg="#e8fff6"; border="2px solid #00c9a7"; col="#006644"; fw=700; }
            else if (i===selected) { bg="#fff0f0"; border="2px solid #ff5555"; col="#aa0000"; }
          }
          return (
            <button key={i} onClick={() => { if(selected===null) setSelected(i); }}
              style={{background:bg,border,borderRadius:10,padding:"0.9rem 1.2rem",cursor:selected!==null?"default":"pointer",textAlign:"left",color:col,fontWeight:fw,fontSize:"0.95rem",transition:"all 0.15s"}}>
              <span style={{fontWeight:700,marginRight:8}}>{String.fromCharCode(65+i)}.</span>{opt}
              {selected!==null&&i===q.answer&&" ✓"}
              {selected!==null&&i===selected&&i!==q.answer&&" ✗"}
            </button>
          );
        })}
      </div>
      {selected!==null && selected!==q.answer && (
        <div style={{background:"#fffbe6",border:"1px solid #f0d060",borderRadius:10,padding:"0.8rem 1rem",marginBottom:12,fontSize:"0.9rem",color:"#555"}}>
          💡 <strong>Explication :</strong> {q.explication}
        </div>
      )}
      {selected!==null && (
        <button onClick={handleNext} style={{width:"100%",background:c.main,color:"#fff",border:"none",borderRadius:10,padding:"12px",cursor:"pointer",fontWeight:700,fontSize:"1rem"}}>
          {current+1>=quizQuestions.length?"Voir les résultats →":"Question suivante →"}
        </button>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState("home");
  const [activeSection, setActiveSection] = useState(null);

  if (view==="section" && activeSection) {
    return <div style={{minHeight:"100vh",background:"#f4f6fb",padding:"1.5rem 0"}}><SectionView section={activeSection} onBack={()=>setView("home")}/></div>;
  }
  if (view==="quiz") {
    const [nomSaisi, setNomSaisi] = React.useState(localStorage.getItem('eleve_nom') || '');
    const [nomConfirme, setNomConfirme] = React.useState(!!localStorage.getItem('eleve_nom'));
    if (!nomConfirme) {
      return (
        <div style={{minHeight:"100vh",background:"#f4f6fb",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:16,padding:"2rem",maxWidth:400,width:"90%",textAlign:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
            <div style={{fontSize:"3rem",marginBottom:"1rem"}}>📝</div>
            <h2 style={{color:"#1a1a2e",marginBottom:"0.5rem"}}>Avant de commencer</h2>
            <p style={{color:"#666",marginBottom:"1.5rem"}}>Entre ton prénom et nom pour que ton résultat soit sauvegardé.</p>
            <input value={nomSaisi} onChange={e=>setNomSaisi(e.target.value)}
              placeholder="Prénom Nom"
              onKeyDown={e=>{if(e.key==='Enter'&&nomSaisi.trim()){localStorage.setItem('eleve_nom',nomSaisi.trim());setNomConfirme(true);}}}
              style={{width:"100%",padding:"10px 14px",border:"2px solid #ddd",borderRadius:8,fontSize:"1rem",marginBottom:"1rem",boxSizing:"border-box"}}/>
            <button onClick={()=>{if(nomSaisi.trim()){localStorage.setItem('eleve_nom',nomSaisi.trim());setNomConfirme(true);}}}
              style={{background:"#1a1a2e",color:"#fff",border:"none",borderRadius:10,padding:"10px 28px",cursor:"pointer",fontWeight:700,fontSize:"1rem",width:"100%"}}>
              Commencer le quiz →
            </button>
            <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:"#888",cursor:"pointer",marginTop:"1rem",fontSize:"0.9rem"}}>← Retour</button>
          </div>
        </div>
      );
    }
    return <div style={{minHeight:"100vh",background:"#f4f6fb",padding:"1.5rem 0"}}><QuizView onBack={()=>setView("home")}/></div>;
  }

  return (
    <div style={{minHeight:"100vh",background:"#f4f6fb"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#2d1b0e 0%,#5c3317 50%,#3d2010 100%)",padding:"3rem 1rem 2.5rem",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 30% 50%, #e07b3940 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, #c8a22730 0%, transparent 60%)"}}/>
        <div style={{position:"relative"}}>
          <div style={{fontSize:"0.85rem",fontWeight:700,color:"#dbb88a",letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>Chapitre 5 — La Terre et l'espace</div>
          <h1 style={{color:"#fff",fontSize:"clamp(1.6rem,5vw,2.5rem)",margin:"0 0 10px",fontWeight:900,letterSpacing:-0.5}}>🪨 Les types de roches</h1>
          <p style={{color:"#dbb88a",fontSize:"1rem",margin:0}}>Secondaire 1 &amp; 2 — Section 5.1</p>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"2rem 1rem"}}>

        {/* Intro box */}
        <div style={{background:"#fff",border:"2px solid #e07b39",borderRadius:14,padding:"1.2rem 1.4rem",marginBottom:28,display:"flex",gap:14,alignItems:"flex-start"}}>
          <span style={{fontSize:"2rem"}}>👋</span>
          <div>
            <div style={{fontWeight:700,color:"#5c3317",marginBottom:4,fontSize:"1rem"}}>Avant de commencer…</div>
            <p style={{color:"#555",fontSize:"0.95rem",lineHeight:1.7,margin:0}}>
              Lis attentivement chaque section, puis complète les activités dans ton document. Une fois la lecture terminée, teste tes connaissances avec le quiz !
            </p>
          </div>
        </div>

        <h2 style={{color:"#1a1a2e",fontSize:"1.1rem",fontWeight:700,marginBottom:16}}>📖 Choisir une section</h2>

        <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:32}}>
          {sections.map(s => {
            const c = SC[s.id];
            return (
              <button key={s.id} onClick={()=>{setActiveSection(s);setView("section");}}
                style={{background:"#fff",border:`2px solid ${c.main}`,borderRadius:14,padding:"1.2rem 1.4rem",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:16,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <div style={{fontSize:"2.4rem"}}>{s.emoji}</div>
                <div>
                  <div style={{fontSize:"0.78rem",fontWeight:700,color:c.main,textTransform:"uppercase",letterSpacing:1}}>Section {s.number}</div>
                  <div style={{fontWeight:700,color:"#1a1a2e",fontSize:"1.05rem"}}>{s.title}</div>
                </div>
                <div style={{marginLeft:"auto",color:c.main,fontSize:"1.2rem"}}>→</div>
              </button>
            );
          })}
        </div>

        <div onClick={()=>setView("quiz")} style={{background:"linear-gradient(135deg,#2d1b0e,#5c3317)",borderRadius:16,padding:"1.5rem",textAlign:"center",cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
          <div style={{fontSize:"2.5rem",marginBottom:8}}>🧠</div>
          <div style={{fontWeight:900,color:"#fff",fontSize:"1.2rem",marginBottom:4}}>Quiz — Teste tes connaissances</div>
          <div style={{color:"#dbb88a",fontSize:"0.9rem"}}>{quizQuestions.length} questions sur les 3 types de roches</div>
          <div style={{marginTop:14,background:"#e07b39",color:"#fff",borderRadius:8,padding:"8px 24px",display:"inline-block",fontWeight:700}}>Commencer le quiz →</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
