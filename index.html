<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours de sciences — M. Mahhou</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --orange: #f97316;
    --orange-dim: #7c3a12;
    --text: #e8eaf0;
    --muted: #8890a8;
    --border: #2e3248;
    --green: #22c55e;
    --green-dim: #14532d;
    --blue: #60a5fa;
    --blue-dim: #1e3a6e;
    --purple: #a78bfa;
    --purple-dim: #3b1f6e;
    --sec1: #22c55e;
    --sec2: #60a5fa;
    --sec3: #f59e0b;
    --sec4: #f97316;
    --sec5: #a78bfa;
    --actu: #f43f5e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 2px solid var(--orange); padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .logo { font-size: 2rem; }
  .header-text h1 { font-size: 1.4rem; font-weight: 700; color: var(--orange); }
  .header-text p { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .header-badge { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.78rem; color: var(--muted); }

  /* SEARCH & FILTERS */
  .controls { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .search-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 1rem; }
  .search-bar input { background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 0.95rem; flex: 1; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 1rem; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn:hover { color: var(--text); border-color: var(--orange); }
  .filter-btn.active { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); font-weight: 600; }
  .filter-btn.f-sec1.active { background: #14532d; border-color: var(--sec1); color: var(--sec1); }
  .filter-btn.f-sec2.active { background: var(--blue-dim); border-color: var(--sec2); color: var(--sec2); }
  .filter-btn.f-sec3.active { background: #78350f; border-color: var(--sec3); color: var(--sec3); }
  .filter-btn.f-sec4.active { background: var(--orange-dim); border-color: var(--sec4); color: var(--sec4); }
  .filter-btn.f-sec5.active { background: var(--purple-dim); border-color: var(--sec5); color: var(--sec5); }
  .filter-btn.f-actu.active { background: #4c0519; border-color: var(--actu); color: var(--actu); }

  /* STATS BAR */
  .stats-bar { max-width: 900px; margin: 0 auto 1rem; padding: 0 1rem; display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; font-size: 0.8rem; }
  .stat-pill span { color: var(--orange); font-weight: 700; }

  /* GRID */
  .grid { max-width: 900px; margin: 0 auto; padding: 0 1rem 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

  /* COURSE CARD */
  .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
  .course-card:hover { border-color: var(--orange); transform: translateY(-2px); }
  .course-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, var(--orange)); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-emoji { font-size: 2rem; line-height: 1; }
  .card-level { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .lv1 { background: #14532d; color: var(--sec1); }
  .lv2 { background: var(--blue-dim); color: var(--sec2); }
  .lv3 { background: #78350f; color: var(--sec3); }
  .lv4 { background: var(--orange-dim); color: var(--sec4); }
  .lv5 { background: var(--purple-dim); color: var(--sec5); }
  .lv-actu { background: #4c0519; color: var(--actu); }
  .card-subject { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.25rem; }
  .card-title { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; }
  .card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 0.68rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; color: var(--muted); }
  .card-sections { display: flex; flex-direction: column; gap: 3px; }
  .section-item { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .card-footer { margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .card-cta { font-size: 0.82rem; font-weight: 600; color: var(--orange); }
  .card-progress { font-size: 0.72rem; color: var(--muted); }

  /* NEW BADGE */
  .badge-new { position: absolute; top: 12px; right: 12px; background: var(--actu); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em; }

  /* EMPTY STATE */
  .empty { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 0.75rem; }

  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
    .stats-bar { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔬</div>
  <div class="header-text">
    <h1>Cours de sciences</h1>
    <p>M. Mahhou — Portail des cours interactifs</p>
  </div>
  <div class="header-badge" id="course-count">— cours</div>
</header>

<div class="controls">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Rechercher un cours, un thème..." oninput="render()">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Tous les cours</button>
    <button class="filter-btn f-actu" data-filter="actu" onclick="setFilter('actu', this)">🔴 Actualité</button>
    <button class="filter-btn f-sec1" data-filter="1" onclick="setFilter('1', this)">Sec 1</button>
    <button class="filter-btn f-sec2" data-filter="2" onclick="setFilter('2', this)">Sec 2</button>
    <button class="filter-btn f-sec3" data-filter="3" onclick="setFilter('3', this)">Sec 3</button>
    <button class="filter-btn f-sec4" data-filter="4" onclick="setFilter('4', this)">Sec 4</button>
    <button class="filter-btn f-sec5" data-filter="5" onclick="setFilter('5', this)">Sec 5</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-pill"><span id="visible-count">—</span> cours affichés</div>
  <div class="stat-pill">Quiz interactifs inclus dans chaque cours</div>
</div>

<div class="grid" id="grid"></div>

<script>
var COURSES = [
  {
    id: "artemis",
    emoji: "🚀",
    level: "actu",
    levelLabel: "Actualité",
    subject: "Sciences · Espace",
    title: "Mission Artémis II — En cours",
    desc: "Le retour des humains vers la Lune ! Apollo, la course à l'espace, les technologies du SLS et d'Orion, le survol lunaire du 6 avril 2026. Quiz 10 questions + liens vidéo.",
    tags: ["Artémis II", "Apollo", "Lune", "NASA", "ASC"],
    sections: ["🌙 La mission", "👩‍🚀 L'équipage", "🚀 Technologies", "📅 Le voyage", "🏛️ Apollo", "🎬 Vidéos", "✅ Quiz"],
    file: "artemis-II.html",
    color: "var(--actu)",
    isNew: true,
  },
  {
    id: "espace",
    emoji: "🌌",
    level: 1,
    levelLabel: "Sec 1",
    subject: "Astronomie",
    title: "L'astronomie — Le système solaire",
    desc: "Planètes, étoiles, galaxies, mouvements célestes. Exploration du système solaire et de l'Univers.",
    tags: ["Planètes", "Étoiles", "Galaxies"],
    sections: ["🌍 Système solaire", "⭐ Les étoiles", "🌌 L'Univers", "🔭 Explorer l'espace"],
    file: "cours_espace.html",
    color: "var(--sec1)",
  },
  {
    id: "roches",
    emoji: "🪨",
    level: 2,
    levelLabel: "Sec 2",
    subject: "Géologie",
    title: "Les roches et les minéraux",
    desc: "Types de roches, cycle des roches, minéraux et leurs propriétés. Comprendre la lithosphère.",
    tags: ["Roches", "Minéraux", "Géologie"],
    sections: ["🪨 Types de roches", "♻️ Cycle des roches", "💎 Minéraux", "🌋 Lithosphère"],
    file: "cours_roches.html",
    color: "var(--sec2)",
  },
  {
    id: "electromagnetisme",
    emoji: "⚡",
    level: 4,
    levelLabel: "Sec 4",
    subject: "Physique",
    title: "L'électromagnétisme",
    desc: "Champs électriques et magnétiques, force de Lorentz, induction électromagnétique. Visualisations animées.",
    tags: ["Champs", "Magnétisme", "Induction"],
    sections: ["⚡ Champ électrique", "🧲 Champ magnétique", "🔄 Induction", "💡 Applications"],
    file: "cours_electromagnetisme_gifs.html",
    color: "var(--sec4)",
  },
  {
    id: "reactions",
    emoji: "🧪",
    level: 5,
    levelLabel: "Sec 5",
    subject: "Chimie",
    title: "Les réactions énergétiques",
    desc: "Réactions exothermiques et endothermiques, enthalpie, énergie d'activation. Diagrammes interactifs.",
    tags: ["Exothermique", "Endothermique", "Enthalpie"],
    sections: ["🔥 Réactions exo", "❄️ Réactions endo", "📊 Enthalpie", "⚡ Énergie d'activation"],
    file: "cours_reactions_energetiques_sec5.html",
    color: "var(--sec5)",
  },
  {
    id: "diagramme",
    emoji: "📊",
    level: 5,
    levelLabel: "Sec 5",
    subject: "Chimie",
    title: "Le diagramme énergétique",
    desc: "Enthalpie, variation d'enthalpie (ΔH), complexe activé, énergie d'activation (Ea). Diagramme interactif endo/exothermique.",
    tags: ["ΔH", "Ea", "Complexe activé"],
    sections: ["🔋 Enthalpie", "📈 Diagramme", "⚡ Complexe activé", "🔵 Endothermique", "🟠 Exothermique"],
    file: "cours_diagramme_energetique_sec5.html",
    color: "var(--sec5)",
  },
];

var activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var filtered = COURSES.filter(function(c) {
    var matchFilter = activeFilter === 'all' ||
      (activeFilter === 'actu' && c.level === 'actu') ||
      (activeFilter !== 'actu' && c.level == parseInt(activeFilter));
    if (!matchFilter) return false;
    if (!q) return true;
    return (c.title + c.desc + c.tags.join(' ') + c.subject).toLowerCase().includes(q);
  });

  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('course-count').textContent = COURSES.length + ' cours';

  var grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Aucun cours trouvé pour cette recherche.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(function(c) {
    var lvClass = c.level === 'actu' ? 'lv-actu' : 'lv' + c.level;
    var sections = c.sections.map(function(s){ return '<div class="section-item">' + s + '</div>'; }).join('');
    var tags = c.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('');
    var newBadge = c.isNew ? '<div class="badge-new">NOUVEAU</div>' : '';
    return '<a class="course-card" href="' + c.file + '" style="--card-color:' + c.color + '">' +
      newBadge +
      '<div class="card-top">' +
        '<div><div class="card-emoji">' + c.emoji + '</div>' +
        '<div class="card-subject">' + c.subject + '</div></div>' +
        '<span class="card-level ' + lvClass + '">' + c.levelLabel + '</span>' +
      '</div>' +
      '<div class="card-title">' + c.title + '</div>' +
      '<div class="card-desc">' + c.desc + '</div>' +
      '<div class="card-tags">' + tags + '</div>' +
      '<div class="card-sections">' + sections + '</div>' +
      '<div class="card-footer">' +
        '<span class="card-cta">Commencer le cours →</span>' +
      '</div>' +
    '</a>';
  }).join('');
}

render();
</script>
</body>
</html>
